stages:
  - lint
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

automated_code_review:
  stage: lint
  image: python:3.10-slim
  script:
    - echo "Running Automated Code Review (Linting)..."
    - pip install flake8
    - flake8 backend/ frontend/ --max-line-length=120
  allow_failure: true
  only:
    - main

build_backend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t ${CI_REGISTRY_IMAGE}/backend:latest ./backend
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push ${CI_REGISTRY_IMAGE}/backend:latest
  only:
    - main

build_frontend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t ${CI_REGISTRY_IMAGE}/frontend:latest ./frontend
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push ${CI_REGISTRY_IMAGE}/frontend:latest
  only:
    - main

test:
  stage: test
  image: python:3.10-slim
  script:
    - echo "Running automated tests..."
    # - pip install pytest
    # - pytest backend/tests/
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_IP >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_IP "cd /path/to/project && docker-compose pull && docker-compose up -d"
  only:
    - main
  environment:
    name: production
